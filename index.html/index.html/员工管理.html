<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>员工管理</title>
    <style>
        /* 清除默认边距 */
        * {
            margin: 0;
            padding: 0;
        }

        /* 顶部导航栏样式 */
        .top-nav {
            background-color: #ccc;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        /* 标题样式 */
        .nav-title {
            font-weight: bold;
            font-size: 20px;
            color: white;
            font-family: "楷体";
        }

        /* 退出登录链接样式 */
        .nav-link {
            text-decoration: none;
            color: #333;
            cursor: pointer;
        }
        
        .nav-link:hover {
            text-decoration: underline;
        }

        /* 搜索区域容器 */
        .search-area {
            padding: 20px;
            background-color: #f9f9f9;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eee;
        }

        /* 表单项包装 */
        .form-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 输入框与下拉框样式 */
        input[type="text"], select {
            height: 32px;
            padding: 0 10px;
            border: 1px solid #ddd;
            
            border-radius: 4px;
            outline: none;
            min-width: 120px;
            width: 200px;
        }
/* 
        /* 按钮通用样式 */
        button {
            height: 32px;
            padding: 0 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        /* 查询按钮 */
        .btn-search {
            background-color: #007bff;
        }

        /* 清空按钮 */
        .btn-clear {
            background-color: #6c757d;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- 第一部分：顶部导航栏（第一行） -->
    <div class="top-nav">
        <div class="nav-title">Tlias 智能学习辅助系统</div>
        <a href="#" class="nav-link">退出登录</a>
    </div>

    <!-- 第二部分：搜索表单区域（第二行） -->
    <div class="search-area">
        <div class="form-item">
            <label>姓名:</label>
            <input type="text" placeholder="请输入姓名">
        </div>
        <div class="form-item">
            <label>性别:</label>
            <select>
                <option value="">请选择</option>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="form-item">
            <label>职位:</label>
            <select>
                <option value="">请选择</option>
                <option value="班主任">班主任</option>
                <option value="讲师">讲师</option>
                <option value="学工主管">学工主管</option>
                <option value="教研主管">教研主管</option>
                <option value="咨询师">咨询师</option>
            </select>
        </div>
        <button class="btn-search">查询</button>
        <button class="btn-clear">清空</button>
    </div>
</body>
</html>
